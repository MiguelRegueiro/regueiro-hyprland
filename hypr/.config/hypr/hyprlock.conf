$font = "Adwaita Sans"
$lockMonitor = DP-1

general {
    hide_cursor = true
}

animations {
    enabled = true
    bezier = snap, 0.05, 0.9, 0.1, 1.0
    animation = fadeIn, 1, 3.0, snap
    animation = fadeOut, 1, 2.2, snap
    animation = inputFieldWidth, 1, 2.8, snap
    animation = inputFieldColors, 1, 2.8, snap
    animation = inputFieldDots, 1, 2.0, snap
    animation = inputFieldFade, 1, 2.2, snap
}

background {
    monitor =
    path = screenshot
    blur_passes = 4
    blur_size = 8
    noise = 0.011
    contrast = 0.88
    brightness = 0.68
    vibrancy = 0.12
    vibrancy_darkness = 0.35
}

label {
    monitor = $lockMonitor
    text = LOCKED
    color = rgba(f6f5f466)
    font_size = 12
    font_family = $font
    text_align = center
    position = 0, 170
    halign = center
    valign = center
}

label {
    monitor = $lockMonitor
    text = $TIME
    color = rgb(f6f5f4)
    font_size = 88
    font_family = $font
    text_align = center
    shadow_size = 4
    shadow_passes = 1
    shadow_color = rgba(00000099)
    position = 0, 118
    halign = center
    valign = center
}

label {
    monitor = $lockMonitor
    text = cmd[update:60000] date +"%A, %d %B"
    color = rgba(f6f5f4bf)
    font_size = 20
    font_family = $font
    text_align = center
    position = 0, 34
    halign = center
    valign = center
}

label {
    monitor = $lockMonitor
    text = Enter password to unlock
    color = rgba(f6f5f47a)
    font_size = 13
    font_family = $font
    text_align = center
    position = 0, 4
    halign = center
    valign = center
}

input-field {
    monitor = $lockMonitor
    size = 320, 58
    outline_thickness = 2
    dots_size = 0.18
    dots_spacing = 0.32
    dots_center = true
    outer_color = rgba(ffffff1a)
    inner_color = rgba(000000b8)
    font_color = rgb(f6f5f4)
    fail_text = <i>$FAIL</i>
    check_text = Unlocking...
    placeholder_text = Password
    fade_on_empty = false
    rounding = 16
    check_color = rgba(3584e4ff)
    fail_color = rgba(ff7b63ff)
    capslock_color = rgba(f8e45cff)
    numlock_color = rgba(f8e45cff)
    bothlock_color = rgba(f8e45cff)
    font_family = $font
    shadow_size = 3
    shadow_passes = 1
    shadow_color = rgba(00000090)
    position = 0, -48
    halign = center
    valign = center
}

label {
    monitor = $lockMonitor
    text = $LAYOUT
    color = rgba(f6f5f466)
    font_size = 11
    font_family = $font
    text_align = center
    position = 0, -104
    halign = center
    valign = center
}
