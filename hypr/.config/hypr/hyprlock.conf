$font = "Adwaita Sans"
$lockMonitor = DP-1
$surface = rgba(00000078)
$surfaceBorder = rgba(f6f5f41a)
$surfaceAccent = rgba(3584e4d0)

general {
    hide_cursor = true
}

animations {
    enabled = true
    bezier = snap, 0.05, 0.9, 0.1, 1.0
    animation = fadeIn, 1, 3.0, snap
    animation = fadeOut, 1, 2.2, snap
    animation = inputFieldWidth, 1, 2.8, snap
    animation = inputFieldColors, 1, 2.8, snap
    animation = inputFieldDots, 1, 2.0, snap
    animation = inputFieldFade, 1, 2.2, snap
}

background {
    monitor =
    path = screenshot
    blur_passes = 4
    blur_size = 8
    noise = 0.011
    contrast = 0.88
    brightness = 0.68
    vibrancy = 0.12
    vibrancy_darkness = 0.35
}

shape {
    monitor = $lockMonitor
    size = 436, 416
    color = $surface
    rounding = 24
    border_size = 1
    border_color = $surfaceBorder
    shadow_passes = 2
    shadow_size = 10
    shadow_color = rgba(00000066)
    shadow_boost = 1.1
    position = 0, 12
    halign = center
    valign = center
    zindex = 0
}

shape {
    monitor = $lockMonitor
    size = 64, 4
    color = $surfaceAccent
    rounding = 4
    position = 0, 164
    halign = center
    valign = center
    zindex = 1
}

label {
    monitor = $lockMonitor
    text = LOCKED
    color = rgba(f6f5f480)
    font_size = 11
    font_family = $font
    text_align = center
    position = 0, 140
    halign = center
    valign = center
    zindex = 2
}

label {
    monitor = $lockMonitor
    text = $TIME
    color = rgb(f6f5f4)
    font_size = 86
    font_family = $font
    text_align = center
    shadow_size = 3
    shadow_passes = 1
    shadow_color = rgba(00000080)
    position = 0, 86
    halign = center
    valign = center
    zindex = 2
}

label {
    monitor = $lockMonitor
    text = cmd[update:60000] date +"%A, %d %B"
    color = rgba(f6f5f4c8)
    font_size = 18
    font_family = $font
    text_align = center
    position = 0, 18
    halign = center
    valign = center
    zindex = 2
}

label {
    monitor = $lockMonitor
    text = Enter password to unlock
    color = rgba(f6f5f499)
    font_size = 12
    font_family = $font
    text_align = center
    position = 0, -20
    halign = center
    valign = center
    zindex = 2
}

input-field {
    monitor = $lockMonitor
    size = 316, 54
    outline_thickness = 2
    dots_size = 0.18
    dots_spacing = 0.32
    dots_center = true
    outer_color = rgba(f6f5f420)
    inner_color = rgba(00000096)
    font_color = rgb(f6f5f4)
    fail_text = <i>$FAIL</i>
    check_text = Unlocking...
    placeholder_text = Enter password
    fade_on_empty = false
    rounding = 15
    check_color = rgba(3584e4ff)
    fail_color = rgba(ff7b63ff)
    capslock_color = rgba(f8e45cff)
    numlock_color = rgba(f8e45cff)
    bothlock_color = rgba(f8e45cff)
    font_family = $font
    shadow_size = 3
    shadow_passes = 1
    shadow_color = rgba(00000090)
    position = 0, -84
    halign = center
    valign = center
    zindex = 2
}

label {
    monitor = $lockMonitor
    text = $LAYOUT
    color = rgba(f6f5f466)
    font_size = 11
    font_family = $font
    text_align = center
    position = 0, -136
    halign = center
    valign = center
    zindex = 2
}
