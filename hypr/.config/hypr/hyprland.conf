# Simple GNOME-like Hyprland setup.
# Generated from your GNOME settings on 2026-04-19.

################
### MONITORS ###
################

# Your laptop panel from ~/.config/monitors.xml. Other monitors use auto layout.
monitor = DP-1,1920x1080@170,1920x0,1
monitor = eDP-1,2880x1800@120,0x120,1.5
monitor = ,preferred,auto,auto

################
### PROGRAMS ###
################

$mainMod = SUPER
$terminal = kitty
$fileManager = nautilus --new-window
$menu = rofi -show drun
$runMenu = rofi -show run
$clipboardMenu = ~/.config/hypr/scripts/cliphist-menu
$powerMenu = ~/.config/hypr/scripts/power-menu
$snap = ~/.config/hypr/scripts/gnome-snap

#################
### AUTOSTART ###
#################

exec-once = qs -n -d
exec-once = hypridle
exec-once = hyprpaper
exec-once = ibus-daemon -drx
exec-once = ~/.config/hypr/scripts/ibus-setup.sh
# Wi-Fi connect/auth is handled by QuickShell now.
# exec-once = sh -c 'sleep 2 && nm-applet --indicator'
exec-once = sh -c 'sleep 2 && blueman-applet'
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
exec-once = wl-clip-persist --clipboard regular
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP XDG_SESSION_DESKTOP HYPRLAND_INSTANCE_SIGNATURE
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP XDG_SESSION_DESKTOP HYPRLAND_INSTANCE_SIGNATURE

###################
### ENVIRONMENT ###
###################

env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = GDK_BACKEND,wayland
env = QT_QPA_PLATFORM,wayland;xcb
env = QT_QPA_PLATFORMTHEME,gtk3
env = SDL_VIDEODRIVER,wayland
env = CLUTTER_BACKEND,wayland
env = GTK_THEME,adw-gtk3-dark
env = GTK_IM_MODULE,ibus
env = QT_IM_MODULE,ibus
env = XMODIFIERS,@im=ibus
env = XCURSOR_THEME,Bibata-Modern-Classic
env = XCURSOR_SIZE,24
env = HYPRCURSOR_THEME,Bibata-Modern-Classic
env = HYPRCURSOR_SIZE,24

#####################
### LOOK AND FEEL ###
#####################

general {
    gaps_workspaces = 24
    gaps_in = 2
    gaps_out = 24
    border_size = 2
    col.active_border = rgba(818a9cff)
    col.inactive_border = rgba(393c44dd)
    resize_on_border = true
    allow_tearing = false
    layout = dwindle
}

decoration {
    rounding = 16
    rounding_power = 2
    active_opacity = 1.0
    inactive_opacity = 1.0

    shadow {
        enabled = true
        range = 24
        render_power = 3
        color = rgba(00000055)
    }

    blur {
        enabled = true
        size = 8
        passes = 3
        new_optimizations = true
        xray = false
        noise = 0.01
        contrast = 0.9
        brightness = 0.85
    }
}

animations {
    enabled = true
    bezier = snap, 0.05, 0.9, 0.1, 1.0
    animation = windows, 1, 0.4, snap, popin 95%
    animation = border, 1, 0.4, snap
    animation = fade, 1, 0.4, snap
    animation = workspaces, 1, 0.6, snap, slide
    animation = layers, 1, 0.4, snap
}

dwindle {
    pseudotile = true
    preserve_split = true
}

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
    disable_splash_rendering = true
    focus_on_activate = true
}

cursor {
    no_hardware_cursors = true
}

#############
### INPUT ###
#############

input {
    kb_layout = es
    kb_options = compose:rctrl
    follow_mouse = 1
    sensitivity = 0
    accel_profile = flat
    repeat_rate = 25
    repeat_delay = 500

    touchpad {
        natural_scroll = true
        tap-to-click = true
        disable_while_typing = true
        scroll_factor = 1
    }
}

device {
    name = razer-razer-viper-ultimate
    sensitivity = -0.1
    accel_profile = flat
}

device {
    name = syna32ee:00-06cb:cfc5-touchpad
    sensitivity = 0
    accel_profile = adaptive
    natural_scroll = true
    tap-to-click = true
}

gesture = 3, horizontal, workspace

###################
### KEYBINDINGS ###
###################

# GNOME-like overview/app search.
bindr = $mainMod, Super_L, exec, pkill -x rofi || $menu
bindr = $mainMod, Super_R, exec, pkill -x rofi || $menu
bind = $mainMod, A, exec, pkill -x rofi || $menu
bind = ALT, F2, exec, $runMenu

# Your GNOME custom shortcuts.
bind = $mainMod, Return, exec, kitty
bind = $mainMod SHIFT, Return, exec, kitty -e fish -ic 'runin; exec fish'
bind = $mainMod, E, exec, nautilus --new-window
bind = $mainMod, B, exec, flatpak run app.zen_browser.zen
bind = $mainMod, R, exec, kitty -e btop
bind = $mainMod, D, exec, kitty -e fish -ic 'elio; exec fish'
bind = $mainMod, W, exec, kitty -e anitrack
bind = $mainMod, F9, exec, normcap

# Window controls matching your GNOME keybindings where Hyprland can.
bind = $mainMod, Q, killactive,
bind = ALT, F4, killactive,
bind = $mainMod, H, movetoworkspacesilent, special:minimized
bind = $mainMod SHIFT, H, togglespecialworkspace, minimized
bind = $mainMod, Up, fullscreen, 1
bind = ALT, F10, fullscreen, 1
bind = $mainMod, Down, exec, $snap restore
bind = ALT, F5, exec, $snap restore
bind = $mainMod, Left, exec, $snap left
bind = $mainMod, Right, exec, $snap right
bind = ALT, Space, togglefloating,

# Alt-Tab style focus cycling.
bind = ALT, Tab, cyclenext, visible
bind = ALT, Tab, alterzorder, top
bind = ALT SHIFT, Tab, cyclenext, visible prev
bind = ALT SHIFT, Tab, alterzorder, top
bind = ALT, Escape, cyclenext, visible
bind = ALT SHIFT, Escape, cyclenext, visible prev

# Move and resize modes, similar to GNOME Alt+F7 / Alt+F8.
bind = ALT, F7, submap, move
submap = move
bind = , Left, moveactive, -40 0
bind = , Right, moveactive, 40 0
bind = , Up, moveactive, 0 -40
bind = , Down, moveactive, 0 40
bind = , Return, submap, reset
bind = , Escape, submap, reset
submap = reset

bind = ALT, F8, submap, resize
submap = resize
bind = , Left, resizeactive, -40 0
bind = , Right, resizeactive, 40 0
bind = , Up, resizeactive, 0 -40
bind = , Down, resizeactive, 0 40
bind = , Return, submap, reset
bind = , Escape, submap, reset
submap = reset

# Workspaces: your GNOME Super+1..5 and Shift+Super+1..5, with extras.
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

bind = $mainMod, Page_Up, workspace, m-1
bind = $mainMod, Page_Down, workspace, m+1
bind = $mainMod, KP_Prior, workspace, m-1
bind = $mainMod, KP_Next, workspace, m+1
bind = $mainMod ALT, Left, workspace, m-1
bind = $mainMod ALT, Right, workspace, m+1
bind = CTRL ALT, Left, workspace, m-1
bind = CTRL ALT, Right, workspace, m+1
bind = CTRL ALT, Up, workspace, m-1
bind = CTRL ALT, Down, workspace, m+1
bind = $mainMod, Home, workspace, 1
bind = $mainMod, End, workspace, 5

bind = $mainMod SHIFT, Page_Up, movetoworkspace, e-1
bind = $mainMod SHIFT, Page_Down, movetoworkspace, e+1
bind = $mainMod SHIFT, KP_Prior, movetoworkspace, e-1
bind = $mainMod SHIFT, KP_Next, movetoworkspace, e+1
bind = $mainMod SHIFT ALT, Left, movetoworkspace, e-1
bind = $mainMod SHIFT ALT, Right, movetoworkspace, e+1
bind = CTRL SHIFT ALT, Left, movetoworkspace, e-1
bind = CTRL SHIFT ALT, Right, movetoworkspace, e+1
bind = CTRL SHIFT ALT, Up, movetoworkspace, e-1
bind = CTRL SHIFT ALT, Down, movetoworkspace, e+1
bind = $mainMod SHIFT, End, movetoworkspace, previous

# Monitor movement from GNOME Super+Shift+Arrows.
bind = $mainMod SHIFT, Left, movewindow, mon:l
bind = $mainMod SHIFT, Right, movewindow, mon:r
bind = $mainMod SHIFT, Up, movewindow, mon:u
bind = $mainMod SHIFT, Down, movewindow, mon:d

# Extra Hyprland navigation that avoids conflicting with GNOME arrows.
bind = $mainMod CTRL, Left, movefocus, l
bind = $mainMod CTRL, Right, movefocus, r
bind = $mainMod CTRL, Up, movefocus, u
bind = $mainMod CTRL, Down, movefocus, d
bind = $mainMod CTRL SHIFT, Left, movewindow, l
bind = $mainMod CTRL SHIFT, Right, movewindow, r
bind = $mainMod CTRL SHIFT, Up, movewindow, u
bind = $mainMod CTRL SHIFT, Down, movewindow, d

# Clipboard, system, input, screenshots, and utilities.
bind = $mainMod, V, exec, $clipboardMenu
bind = $mainMod CTRL, S, exec, qs ipc call quicksettings toggle
bind = $mainMod, S, exec, $powerMenu

bind = $mainMod, L, exec, $powerMenu lock
bind = $mainMod SHIFT, L, exec, $powerMenu shutdown
bind = $mainMod SHIFT, P, exec, $powerMenu reboot
bind = CTRL ALT, Delete, exec, $powerMenu logout

bind = $mainMod, Space, exec, ~/.config/hypr/scripts/ibus-toggle.sh
bind = , F9, exec, ~/.config/hypr/scripts/screenshot.sh full
bind = SHIFT, F9, exec, ~/.config/hypr/scripts/screenshot.sh area 0.25
bind = ALT, F9, exec, ~/.config/hypr/scripts/screenshot.sh window 0.15
bind = CTRL SHIFT ALT, F9, exec, ~/.config/hypr/scripts/screenshot.sh annotate 0.25
bind = , code:107, exec, ~/.config/hypr/scripts/screenshot.sh full
bind = SHIFT, code:107, exec, ~/.config/hypr/scripts/screenshot.sh area 0.25
bind = ALT, code:107, exec, ~/.config/hypr/scripts/screenshot.sh window 0.15
bind = CTRL SHIFT ALT, R, exec, ~/.config/hypr/scripts/screenshot.sh annotate 0.25
bind = $mainMod SHIFT, C, exec, hyprpicker -a
bind = $mainMod, F, fullscreen, 0

# Multimedia keys. Brightness works once brightnessctl is installed.
bindel = , XF86AudioRaiseVolume, exec, ~/.config/hypr/scripts/vol-up.sh
bindel = , XF86AudioLowerVolume, exec, ~/.config/hypr/scripts/vol-down.sh
bindel = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = , XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = , XF86MonBrightnessUp, exec, command -v brightnessctl >/dev/null 2>&1 && brightnessctl -e4 -n2 set 6%+
bindel = , XF86MonBrightnessDown, exec, command -v brightnessctl >/dev/null 2>&1 && brightnessctl -e4 -n2 set 6%-
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

# Mouse window management.
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow
bind = $mainMod, mouse_up, workspace, m+1
bind = $mainMod, mouse_down, workspace, m-1

##############################
### WINDOWS AND WORKSPACES ###
##############################

layerrule {
    name = quickshell-blur
    blur = true
    match:namespace = quickshell
}

layerrule {
    name = rofi-blur
    blur = true
    match:namespace = rofi
}

layerrule {
    name = qs-border-noblur
    blur = false
    match:namespace = qs-border
}




workspace = f[1], gapsout:14, gapsin:4
workspace = 1, monitor:DP-1, persistent:true, default:true
workspace = 2, monitor:DP-1, persistent:true
workspace = 3, monitor:DP-1, persistent:true
workspace = 4, monitor:DP-1, persistent:true
workspace = 5, monitor:DP-1, persistent:true
workspace = 10, monitor:eDP-1, persistent:true, default:true

windowrule {
    name = suppress-maximize-events
    match:class = .*
    suppress_event = maximize
}

windowrule {
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false
    no_focus = true
}
