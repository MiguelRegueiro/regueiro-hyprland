#################
### AUTOSTART ###
#################

# Propagate Wayland env into systemd/D-Bus so session services that query it can see it.
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP XDG_SESSION_DESKTOP HYPRLAND_INSTANCE_SIGNATURE
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP XDG_SESSION_DESKTOP HYPRLAND_INSTANCE_SIGNATURE
exec-once = wl-clip-persist --clipboard regular
exec-once = systemctl --user start mimeclipd
exec-once = qs -n -d
exec-once = hypridle
exec-once = hyprpaper
exec-once = systemctl --user start hyprpolkitagent.service
exec-once = fcitx5 -d
# Wait for fcitx5 to be ready, then force Spanish as the session-start input method.
# fcitx5 manages DefaultIM in its profile itself; using the runtime API is the only reliable way.
exec-once = sh -c 'until fcitx5-remote --check 2>/dev/null; do sleep 0.2; done; fcitx5-remote -s keyboard-es'
# Wi-Fi connect/auth is handled directly by QuickShell via nmcli.
exec-once = sh -c 'sleep 2 && blueman-applet'
