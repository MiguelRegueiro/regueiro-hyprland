#################
### AUTOSTART ###
#################

exec-once = qs -n -d
exec-once = hypridle
exec-once = hyprpaper
exec-once = systemctl --user start hyprpolkitagent.service
exec-once = fcitx5 -d
# Wi-Fi connect/auth is handled directly by QuickShell via nmcli.
exec-once = sh -c 'sleep 2 && blueman-applet'
exec-once = wl-paste --type text --watch ~/.config/hypr/scripts/cliphist-store-text
exec-once = wl-paste --type image --watch cliphist store
exec-once = wl-clip-persist --clipboard regular
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP XDG_SESSION_DESKTOP HYPRLAND_INSTANCE_SIGNATURE
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP XDG_SESSION_DESKTOP HYPRLAND_INSTANCE_SIGNATURE
