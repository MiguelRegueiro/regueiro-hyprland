###################
### KEYBINDINGS ###
###################

# Overview and app search bindings.
bindr = $mainMod, Super_L, exec, $menu
bindr = $mainMod, Super_R, exec, $menu
bind = $mainMod, A, exec, $menu
bind = ALT, F2, exec, $runMenu

# App launcher and custom command bindings.
bind = $mainMod, Return, exec, $terminal
bind = $mainMod SHIFT, Return, exec, $terminal -e fish -ic 'runin; exec fish'
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, B, exec, flatpak run app.zen_browser.zen
bind = $mainMod, R, exec, $terminal -e btop
bind = $mainMod, D, exec, $terminal -e fish -ic 'elio; exec fish'
bind = $mainMod, W, exec, $terminal -e anitrack
bind = $mainMod, F9, exec, normcap

# Window management bindings.
bind = $mainMod, Q, killactive,
bind = ALT, F4, killactive,
bind = $mainMod, H, movetoworkspacesilent, special:minimized
bind = $mainMod SHIFT, H, togglespecialworkspace, minimized
bind = $mainMod, Up, fullscreen, 1
bind = ALT, F10, fullscreen, 1
bind = $mainMod, Down, exec, $snap restore
bind = ALT, F5, exec, $snap restore
bind = $mainMod, Left, exec, $snap left
bind = $mainMod, Right, exec, $snap right
bind = ALT, Space, togglefloating,

# Alt-Tab style focus cycling.
bind = ALT, Tab, cyclenext, visible
bind = ALT, Tab, alterzorder, top
bind = ALT SHIFT, Tab, cyclenext, visible prev
bind = ALT SHIFT, Tab, alterzorder, top
bind = ALT, Escape, cyclenext, visible
bind = ALT SHIFT, Escape, cyclenext, visible prev

# Move and resize submaps.
bind = ALT, F7, submap, move
submap = move
bind = , Left, moveactive, -40 0
bind = , Right, moveactive, 40 0
bind = , Up, moveactive, 0 -40
bind = , Down, moveactive, 0 40
bind = , Return, submap, reset
bind = , Escape, submap, reset
submap = reset

bind = ALT, F8, submap, resize
submap = resize
bind = , Left, resizeactive, -40 0
bind = , Right, resizeactive, 40 0
bind = , Up, resizeactive, 0 -40
bind = , Down, resizeactive, 0 40
bind = , Return, submap, reset
bind = , Escape, submap, reset
submap = reset

# Workspace navigation and move bindings.
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

bind = $mainMod, Page_Up, workspace, m-1
bind = $mainMod, Page_Down, workspace, m+1
bind = $mainMod, KP_Prior, workspace, m-1
bind = $mainMod, KP_Next, workspace, m+1
bind = $mainMod ALT, Left, workspace, m-1
bind = $mainMod ALT, Right, workspace, m+1
bind = CTRL ALT, Left, workspace, m-1
bind = CTRL ALT, Right, workspace, m+1
bind = CTRL ALT, Up, workspace, m-1
bind = CTRL ALT, Down, workspace, m+1
bind = $mainMod, Home, workspace, 1
bind = $mainMod, End, workspace, 5

bind = $mainMod SHIFT, Page_Up, movetoworkspace, e-1
bind = $mainMod SHIFT, Page_Down, movetoworkspace, e+1
bind = $mainMod SHIFT, KP_Prior, movetoworkspace, e-1
bind = $mainMod SHIFT, KP_Next, movetoworkspace, e+1
bind = $mainMod SHIFT ALT, Left, movetoworkspace, e-1
bind = $mainMod SHIFT ALT, Right, movetoworkspace, e+1
bind = CTRL SHIFT ALT, Left, movetoworkspace, e-1
bind = CTRL SHIFT ALT, Right, movetoworkspace, e+1
bind = CTRL SHIFT ALT, Up, movetoworkspace, e-1
bind = CTRL SHIFT ALT, Down, movetoworkspace, e+1
bind = $mainMod SHIFT, End, movetoworkspace, previous

# Move windows between monitors.
bind = $mainMod SHIFT, Left, movewindow, mon:l
bind = $mainMod SHIFT, Right, movewindow, mon:r
bind = $mainMod SHIFT, Up, movewindow, mon:u
bind = $mainMod SHIFT, Down, movewindow, mon:d

# Directional focus and window movement bindings.
bind = $mainMod CTRL, Left, movefocus, l
bind = $mainMod CTRL, Right, movefocus, r
bind = $mainMod CTRL, Up, movefocus, u
bind = $mainMod CTRL, Down, movefocus, d
bind = $mainMod CTRL SHIFT, Left, movewindow, l
bind = $mainMod CTRL SHIFT, Right, movewindow, r
bind = $mainMod CTRL SHIFT, Up, movewindow, u
bind = $mainMod CTRL SHIFT, Down, movewindow, d

# Clipboard, system, input, screenshots, and utilities.
bind = $mainMod, V, exec, $clipboardMenu
bind = $mainMod CTRL, S, exec, qs ipc call quicksettings toggle
bind = $mainMod, S, exec, $powerMenu

bind = $mainMod, L, exec, $powerMenu lock
bind = $mainMod SHIFT, L, exec, $powerMenu shutdown
bind = $mainMod SHIFT, P, exec, $powerMenu reboot
bind = CTRL ALT, Delete, exec, $powerMenu logout

bind = $mainMod, Space, exec, ~/.config/hypr/scripts/input-toggle.sh
bind = , F9, exec, ~/.config/hypr/scripts/screenshot.sh full
bind = SHIFT, F9, exec, ~/.config/hypr/scripts/screenshot.sh area 0.25
bind = ALT, F9, exec, ~/.config/hypr/scripts/screenshot.sh window 0.15
bind = CTRL SHIFT ALT, F9, exec, ~/.config/hypr/scripts/screenshot.sh annotate 0.25
bind = , code:107, exec, ~/.config/hypr/scripts/screenshot.sh full
bind = SHIFT, code:107, exec, ~/.config/hypr/scripts/screenshot.sh area 0.25
bind = ALT, code:107, exec, ~/.config/hypr/scripts/screenshot.sh window 0.15
bind = CTRL SHIFT ALT, R, exec, ~/.config/hypr/scripts/screenshot.sh annotate 0.25
bind = $mainMod SHIFT, C, exec, hyprpicker -a
bind = $mainMod, F, fullscreen, 0

# Hardware media keys.
bindel = , XF86AudioRaiseVolume, exec, ~/.config/hypr/scripts/vol-up.sh
bindel = , XF86AudioLowerVolume, exec, ~/.config/hypr/scripts/vol-down.sh
bindel = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = , XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = , XF86MonBrightnessUp, exec, ~/.config/hypr/scripts/brightness-up.sh
bindel = , XF86MonBrightnessDown, exec, ~/.config/hypr/scripts/brightness-down.sh
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

# Mouse window management.
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow
bind = $mainMod, mouse_up, workspace, m+1
bind = $mainMod, mouse_down, workspace, m-1
